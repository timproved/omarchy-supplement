# Extra Hyprland configuration sourced by install.sh.
# Keep general overrides here when they do not belong in one of the standard files.

# Current external monitor override.
#monitor = DP-2, 3840x2160@144.05, 0x0, 1.5, vrr, 1
monitor = eDP-1, 2880x1800@120, 0x0, 2, vrr, 1

# Example: remove the inner gaps between tiled windows.
general {
  gaps_in = 1
  gaps_out = 1
  #border_size = 0
}

# Example: adjust monitor scaling.
# Replace eDP-1 with your actual display name from `hyprctl monitors`.
# monitor = eDP-1, preferred, auto, 1.25

# Example: mirror a laptop display to an external monitor.
# Replace HDMI-A-1 and eDP-1 with your actual monitor names from `hyprctl monitors`.
# monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1

# windowrule = workspace 5, match:class qemu
